<!DOCTYPE html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/layout}"
>
  <head>
    <title>기숙사 관리</title>
  </head>
  <body>
    <div layout:fragment="content">

      <div class="breadcrumb d-flex flex-wrap align-items-center justify-content-between gap-3 mb-24">
        <div>
          <h6 class="fw-semibold mb-0">기숙사 관리</h6>
          <p class="text-neutral-600 mt-4 mb-0">기숙사 배정 현황을 관리합니다</p>
        </div>
      </div>

      <!-- React 마운트 포인트 -->
      <div id="dormitory-root">
        <div class="card radius-12">
          <div class="card-body text-center py-40">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">불러오는 중...</span>
            </div>
            <p class="text-secondary-light mt-12 mb-0">기숙사 정보를 불러오는 중입니다...</p>
          </div>
        </div>
      </div>

    </div>

    <th:block layout:fragment="script">
      <script type="module" th:src="@{/js/react/cheol/dormitory.js}"></script>
    </th:block>
  </body>
</html>
