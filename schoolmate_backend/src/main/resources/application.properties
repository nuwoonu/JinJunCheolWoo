spring.application.name=schoolmate

# React 프론트엔드 URL (dev: http://localhost:5173, prod: 비워두면 동일 오리진)
app.frontend-url=http://localhost:5173

# [woo] LocalTime/LocalDate -> 배열이 아닌 문자열로 직렬화 (React fetch 파싱용)
spring.jackson.serialization.write-dates-as-timestamps=false

# 페이지 1부터 시작
spring.data.web.pageable.one-indexed-parameters=true

# DB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/schoolmate
spring.datasource.username=javadb
spring.datasource.password=12345

# JPA
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# OAuth 프로파일 포함
spring.profiles.include=oauth

# 파일 업로드
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# 로깅
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# 업로드 경로
# com.example.schoolmate.upload.path= 본인업로드경로

# JWT (access: 30분, refresh: 7일)
jwt.secret=schoolmate-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.access-token-expiry=1800000
jwt.refresh-token-expiry=604800000

# NEIS API - 중앙고등학교
neis.api.key=000c77bb30b040b9aa43dea74658846c
# 시도 교육청 코드
neis.school.atpt-code=B10
# 학교 코드 
neis.school.code=7010240
